name: Release HoraSpace

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win:${{ matrix.arch }}

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ matrix.arch }}
          path: |
            dist-electron/releases/HoraSpace-*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Build macOS installer
        run: npm run dist:mac

      - name: Upload macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist-electron/releases/HoraSpace-*.dmg
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release notes
        run: |
          {
            echo "## HoraSpace ${GITHUB_REF_NAME}"
            echo
            echo "本版本由 GitHub Actions 自动构建。"
            echo
            echo "### 下载说明"
            echo "- Windows x64：适合大多数 Intel / AMD Windows 电脑"
            echo "- Windows arm64：适合 Windows ARM 设备"
            echo "- macOS dmg：适合 macOS 安装"
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo hora35711/HoraSpace >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --repo hora35711/HoraSpace --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --repo hora35711/HoraSpace \
              --title "HoraSpace ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi
